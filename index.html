<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Games Website</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Days+One&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link rel="stylesheet" href="./css/bootstrap.min.css" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body class="bg-dark" data-bs-theme="dark">
    <!-- ========== Start Nav-Bar ========== -->
    <nav class="navbar navbar-expand-lg my-nav fixed-top z-50">
      <div class="container">
        <a class="navbar-brand" href="#">
          <i class="fa-solid fa-gamepad main-text"></i>
        </a>
        <a class="navbar-brand main-text fs-4" href="#">Game Arena</a>
        <button
          class="navbar-toggler myNav-btn"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon">
            <i class="fa-solid fa-bars"></i>
          </span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active fs-6" aria-current="page" href="#home"
                >Home</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link fs-6" href="#games">Our Games</a>
            </li>
            <li class="nav-item">
              <a class="nav-link fs-6" href="#what-we-do">What We Do</a>
            </li>
            <li class="nav-item">
              <a class="nav-link fs-6" href="#team">Our Team</a>
            </li>
            <li class="nav-item">
              <a class="nav-link fs-6" href="#contact">Contact Us</a>
            </li>
          </ul>
          <a href=""> <i class="fa-regular fa-bell m-2 fs-5 text-white"></i></a>
          <a href=""
            ><i class="fa-regular fa-message m-3 fs-5 text-white"></i
          ></a>
          <button class="btn bg-main btn-shine">Sign In</button>
        </div>
      </div>
    </nav>

    <!-- ========== End Nav-Bar ========== -->

    <main>
      <!-- ========== Start Home ========== -->
      <section class="home py-5 my-5 d-flex flex-wrap align-items-center" id="home">
        <div class="container my-5">
          <div class="row">
            <div class="col-sm-12 col-md-6 col-lg-6 ">
              <h1 class="text-uppercase display-4 text-white">
                THE ULTIMATE
                <span class="main-text">GAMING</span>
                EXPERIENCE
              </h1>
              <p class="lead text-white">
                Join millions of gamers worldwide in the most competitive
                eSports tournaments. Experience next-level gaming with
                cutting-edge technology and endless possibilities.
              </p>
              <div class="d-flex flex-wrap">
                <button class="btn btn-1 bg-main btn-shine">Start Gaming Now</button>
                <button class="btn btn-2 main-text">Watch Tournaments</button>
              </div>
            </div>
             <div class="col-sm-12 col-md-6 col-lg-6 ">
              <div class="image-content">
                <img class="" src="./images/imgi_1_hero.png" alt="">
                <div class="badge active-player d-flex flex-wrap justify-content-between align-items-center">
                  <div class="active-player-icon px-2 fs-3 main-text">
                    <i class="fa-solid fa-trophy"></i>
                  </div>
                  <div class="active-player-content">
                    <p class="text-gray">Active Players</p>
                    <h3>2.5M+</h3>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
      <!-- ========== End Home ========== -->
    </main>
    <script src="./js/bootstrap.bundle.min.js"></script>
  </body>
</html>
